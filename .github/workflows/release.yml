name: release

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - '.github/workflows/release.yml'
  push:
    tags:
      - 'app-v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM for bindgen
        shell: pwsh
        run: choco install llvm -y --no-progress

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Patch version from tag
        if: startsWith(github.ref, 'refs/tags/app-v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^app-v',''
          Write-Host "Patching to version $version"
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 32 | Set-Content src-tauri/tauri.conf.json -Encoding utf8
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 32 | Set-Content package.json -Encoding utf8

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/app-v') && 'app-v__VERSION__' || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/app-v') && 'AIEP Subtitulos v__VERSION__' || '' }}
          releaseDraft: true
          prerelease: false
          releaseBody: |
            Instalador de AIEP Subtitulos para Windows 10/11 (x64).

            **Aviso SmartScreen**: el instalador no esta firmado digitalmente (firmar cuesta dinero y este proyecto no tiene presupuesto). Al ejecutarlo Windows puede mostrar "Windows protegio tu PC". Haz click en **Mas informacion** -> **Ejecutar de todas formas**. Es normal para instaladores sin certificado.

            **Requisitos**: Windows 10 desde April 2018 Update o Windows 11, 64-bit, conexion a internet (necesaria para el relay y, la primera vez, para instalar WebView2 si falta).

      - name: Upload installer as PR artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: aiep-subtitulos-windows-x64-pr-${{ github.event.pull_request.number }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14
          if-no-files-found: error
